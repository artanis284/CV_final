experiment_name: act_calvin_env_abc
algorithm: ACT
dataset:
  name: CALVIN
  environments: ["A", "B", "C"]
  root: data/calvin
model:
  policy: act
  backbone: resnet18
  hidden_dim: 512
  dim_feedforward: 3200
  n_encoder_layers: 4
  n_decoder_layers: 7
  nheads: 8
  chunk_size: 100
  kl_weight: 10
training:
  batch_size: 32
  learning_rate: 0.0001
  optimizer: AdamW
  weight_decay: 0.0001
  epochs: 50
  loss: ActionL1Loss + KL
logging:
  backend: wandb
  project: cv-final-act
  run_name: act_calvin_env_abc
